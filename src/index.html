<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portal Carvalho</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal/css/portal.css" />
  <link rel="stylesheet" href="portal/css/portal-auth.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand-panel">
      <div class="brand-badge" aria-label="Logo Portal Carvalho">
        <span class="brand-logo" aria-hidden="true">
          <span class="brand-logo-ring"></span>
          <span class="brand-logo-axis"></span>
          <span class="brand-logo-core"></span>
        </span>
      </div>
      <h1>Portal Carvalho</h1>
    </section>

    <section class="auth-card" aria-label="Acesso ao portal">
      <form id="loginForm" class="auth-form">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="seuemail@dominio.com" value="maykocarvalho@gmail.com" required />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Digite sua senha" value="123456" required />

        <button class="btn primary full" type="submit">Acessar Portal</button>
      </form>

      <div class="auth-actions-row">
        <button id="sendMagicLink" type="button" class="btn ghost full">Enviar link mágico por e-mail</button>
      </div>

      <p id="authMessage" class="auth-message" role="status"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/js/env.js"></script>
  <script src="portal/js/supabase-config.js"></script>
  <script src="portal/js/portal-auth.js"></script>
</body>
</html>
